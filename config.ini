[paths]
# Directory containing subfolders of audio tracks (e.g. genre folders)
audio_root_dir = 
# Directory where output data (extracted features, plots, models, logs) will be saved
output_dir = 

[cnn]
# Feature representation used for the CNN. Options: 'mel' or 'mfcc'
feature_type = mel
batch_size = 10
epochs = 30
model_name = audio_classifier_Mel_spec_VCv1.h5

[knn]
n_neighbors = 10

[xgb]
n_estimators = 500
learning_rate = 0.1
max_depth = 6
